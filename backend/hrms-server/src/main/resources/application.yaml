spring:
  application:
    name: hrms-server

  # 禁用 Docker Compose 自动启动
  docker:
    compose:
      enabled: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.hrms
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 密钥（开发环境使用默认值，生产环境必须通过环境变量设置）
  # 注意：JWT密钥必须至少32字节(256位)
  secret: ${JWT_SECRET:hrms-dev-jwt-secret-key-2024-must-be-32-bytes}
  expiration: ${JWT_EXPIRATION:604800000}  # 7天（毫秒），可配置

# 文件上传配置
file:
  upload:
    # 文件存储路径（Windows 示例）
    path: ${FILE_UPLOAD_PATH:D:/hrms/files}
    # 单个文件最大大小（默认 10MB）
    max-size: ${FILE_MAX_SIZE:10485760}
    # 允许的文件类型（逗号分隔）
    allowed-types: ${FILE_ALLOWED_TYPES:jpg,jpeg,png,gif,bmp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt}
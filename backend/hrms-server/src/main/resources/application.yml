# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Spring Application
spring:
  application:
    name: hrms-server
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  sql:
    init:
      mode: never

  # Data Source
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 30000
      pool-name: HikariPool

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5


  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: ${RABBITMQ_CONNECTION_TIMEOUT:1000ms}
    dynamic: ${RABBITMQ_DYNAMIC:false}
    listener:
      simple:
        auto-startup: ${RABBITMQ_LISTENER_AUTO_STARTUP:false}
        acknowledge-mode: auto
        concurrency: 5
        max-concurrency: 10
      direct:
        auto-startup: ${RABBITMQ_LISTENER_AUTO_STARTUP:false}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT
hrms:
  jwt:
    secret: ${JWT_SECRET:hrms-default-secret-key-2026-hrms-default-secret-key-2026}
    expiration: ${JWT_EXPIRATION:7200000}
    header: Authorization
    token-prefix: Bearer

  # AES 加密配置（敏感字段加密）
  aes:
    secret-key: ${HRMS_AES_KEY:hrms-default-aes-key-256-bit-long-key-2026}

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.hrms
  paths-to-match: /api/v1/**
  use-common-description: true

# Logging
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.hrms: ${LOG_LEVEL:DEBUG}
    com.baomidou: INFO
    org.springframework.amqp.rabbit.connection.CachingConnectionFactory: ERROR
    org.springframework.amqp.rabbit.listener.SimpleMessageListenerContainer: ERROR
    org.springframework.amqp.rabbit.listener.DirectMessageListenerContainer: ERROR
    com.rabbitmq.client: ERROR
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} [%line] - %msg%n'

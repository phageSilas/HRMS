spring:
  config:
    activate:
      on-profile: dev

  # 数据源配置（从环境变量读取）
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hrms}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:230814}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 临时禁用 Redis（验证地基搭建时）
  data:
    redis:
      client-type: lettuce
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # 临时禁用 RabbitMQ（验证地基搭建时）
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}

  # 自动配置排除（临时禁用 Redis 和 RabbitMQ 自动配置）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# 开发环境日志配置
logging:
  level:
    com.hrms: ${LOG_LEVEL:debug}
    org.springframework.web: debug